version: '3.8'

services:
  neo4j:
    image: neo4j:5-community
    platform: linux/arm64
    restart: always
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-opengraphity_local}
      NEO4J_server_memory_heap_initial__size: 2g
      NEO4J_server_memory_heap_max__size: 4g
      NEO4J_server_memory_pagecache_size: 1g
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    networks:
      - opengrafo
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    platform: linux/arm64
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - opengrafo
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  rabbitmq:
    image: rabbitmq:3-management-alpine
    platform: linux/arm64
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-opengraphity}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-opengraphity_local}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - opengrafo
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    platform: linux/arm64
    restart: always
    command: start-dev
    environment:
      KC_DB: dev-mem
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-opengrafo_local}
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
    ports:
      - "8080:8080"
    networks:
      - opengrafo
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  api:
    platform: linux/arm64
    build:
      context: .
      dockerfile: apps/api/Dockerfile_pi5
    restart: always
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-opengraphity_local}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-opengraphity}:${RABBITMQ_PASSWORD:-opengraphity_local}@rabbitmq:5672
    networks:
      - opengrafo

  web:
    platform: linux/arm64
    build:
      context: .
      dockerfile: apps/web/Dockerfile_pi5
      args:
        VITE_GRAPHQL_URL: /graphql
    restart: always
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certs_pi5:/etc/nginx/certs:ro
    networks:
      - opengrafo

volumes:
  neo4j-data:
  neo4j-logs:
  redis-data:
  rabbitmq-data:

networks:
  opengrafo:
    driver: bridge
