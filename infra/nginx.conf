# ── Common proxy headers ──────────────────────────────────────────────────────
# Defined as a reusable snippet via map/include is not available in conf.d,
# so headers are repeated per location below.
#
# NOTE: proxy_pass uses $variables so that DNS resolution is deferred to
# request time (using the Docker embedded resolver 127.0.0.11) rather than
# resolved once at nginx startup — preventing "host not found in upstream"
# when sibling containers start after nginx.

# ── Portal: portal.{tenant}.localhost ────────────────────────────────────────
server {
    listen 80;
    server_name ~^portal\.(?<tenant>[^.]+)\.localhost$;

    resolver 127.0.0.11 ipv6=off valid=30s;

    large_client_header_buffers 4 32k;
    proxy_buffer_size           128k;
    proxy_buffers               4 256k;
    proxy_busy_buffers_size     256k;

    add_header X-Content-Type-Options "nosniff"                      always;
    add_header X-Frame-Options        "DENY"                         always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── SSE — no buffering, no upgrade ──────────────────────────────────────
    location /api/sse {
        set $upstream_api api:4000;
        proxy_pass         http://$upstream_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        '';
        proxy_set_header   Upgrade           '';
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 86400s;
        add_header         Cache-Control     "no-cache"           always;
    }

    # ── GraphQL ──────────────────────────────────────────────────────────────
    location /graphql {
        set $upstream_api api:4000;
        proxy_pass         http://$upstream_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }

    # ── REST API ─────────────────────────────────────────────────────────────
    location /api/ {
        set $upstream_api api:4000;
        proxy_pass         http://$upstream_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }

    # ── Portal SPA ───────────────────────────────────────────────────────────
    location / {
        set $upstream_portal portal:80;
        proxy_pass         http://$upstream_portal;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }
}

# ── Agent app: {tenant}.localhost (but NOT portal.*) ─────────────────────────
server {
    listen 80;
    server_name ~^(?<tenant>[^.]+)\.localhost$;

    resolver 127.0.0.11 ipv6=off valid=30s;

    large_client_header_buffers 4 32k;
    proxy_buffer_size           128k;
    proxy_buffers               4 256k;
    proxy_busy_buffers_size     256k;

    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' http://localhost:8080; img-src 'self' data:; font-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"
        always;
    add_header X-Content-Type-Options "nosniff"                         always;
    add_header X-Frame-Options        "DENY"                            always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── SSE — no buffering ────────────────────────────────────────────────────
    location /api/sse {
        set $upstream_api api:4000;
        proxy_pass         http://$upstream_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        '';
        proxy_set_header   Upgrade           '';
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 86400s;
        add_header         Cache-Control     "no-cache" always;
    }

    # ── GraphQL ───────────────────────────────────────────────────────────────
    location /graphql {
        set $upstream_api api:4000;
        proxy_pass         http://$upstream_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }

    # ── REST API ──────────────────────────────────────────────────────────────
    location /api/ {
        set $upstream_api api:4000;
        proxy_pass         http://$upstream_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }

    # ── Web SPA (web container handles static files + its own cache headers) ──
    location / {
        set $upstream_web web:80;
        proxy_pass         http://$upstream_web;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }
}
