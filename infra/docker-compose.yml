services:

  # ── Infrastructure ─────────────────────────────────────────────────────────

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-opengraphity_local}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      # Explicit memory bounds — without them Neo4j sizes itself on host RAM
      # and is the first OOM candidate on the machine
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
      NEO4J_server_memory_pagecache_size: 512m
    mem_limit: 2g
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - opengrafo-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - opengrafo-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: opengraphity
      MINIO_ROOT_PASSWORD: opengraphity_local
    volumes:
      - minio_data:/data
    networks:
      - opengrafo-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: opengrafo-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: opengrafo_local
      KC_DB: dev-file
      KC_HTTP_PORT: 8080
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
    networks:
      - opengrafo-network
    healthcheck:
      # The Keycloak image has no curl/wget — probe /health/ready via bash /dev/tcp
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q '\"status\": \"UP\"' <&3"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  grafana:
    image: grafana/grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - opengrafo-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.56
    container_name: jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      # Badger on a volume: traces survive container restarts (memory storage lost them)
      - SPAN_STORAGE_TYPE=badger
      - BADGER_EPHEMERAL=false
      - BADGER_DIRECTORY_VALUE=/badger/data
      - BADGER_DIRECTORY_KEY=/badger/key
    ports:
      - "16686:16686"
      - "4318:4318"
    volumes:
      - jaeger_data:/badger
    mem_limit: 512m
    restart: unless-stopped
    networks:
      - opengrafo-network

  loki:
    image: grafana/loki:2.9.0
    container_name: opengrafo-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - opengrafo-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.0
    container_name: opengrafo-promtail
    volumes:
      - /tmp:/var/log/opengrafo
      - ./promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - opengrafo-network
    depends_on:
      - loki
    restart: unless-stopped

  # Reverse proxy for subdomain routing (c-one.localhost, portal.c-one.localhost)
  nginx:
    image: nginx:stable-alpine
    container_name: opengrafo-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - opengrafo-network
    healthcheck:
      # TCP-only: an HTTP probe would proxy to upstreams and report THEIR health
      test: ["CMD-SHELL", "nc -z 127.0.0.1 80"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      - keycloak
      - api
      - web
      - portal
    restart: unless-stopped

  # ── Application ────────────────────────────────────────────────────────────

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      # Local stack runs with NODE_ENV=production — keep Apollo Sandbox usable
      GRAPHQL_INTROSPECTION: "true"
      PORT: "4000"
      LOG_LEVEL: ${LOG_LEVEL:-info}

      # Neo4j
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-opengraphity_local}

      # Redis — both forms used by different packages
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_URL: redis://redis:6379

      # Keycloak
      # Internal URL — used by the API for JWKS fetch and admin calls (Docker network)
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_ADMIN_URL: http://keycloak:8080
      # Public URL — the origin browsers use; tokens carry this in their `iss` claim
      KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8080}
      KEYCLOAK_ADMIN_USER: admin
      KEYCLOAK_ADMIN_PASSWORD: opengrafo_local
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-master}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-opengrafo-api}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-}

      # Security
      JWT_SECRET: ${JWT_SECRET:-docker-dev-jwt-secret-not-for-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      DISCOVERY_ENCRYPTION_KEY: ${DISCOVERY_ENCRYPTION_KEY:-}

      # Email (Resend)
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-OpenGrafo <onboarding@resend.dev>}

      # Storage
      ATTACHMENT_DIR: /data/attachments
      BACKUP_DIR: /data/backups

      # CORS — allow web and portal origins (subdomain routing + direct port access)
      CORS_ORIGIN: ${CORS_ORIGIN:-http://*.localhost,http://localhost:5173,http://localhost:5174,http://localhost}

      # Observability
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_ENDPOINT: http://jaeger:4318/v1/traces

      # Embeddings (semantic similarity: incident simili + KB suggerita)
      # local = Transformers.js ONNX in-process (default, nessun servizio esterno)
      # voyage = Voyage AI API (richiede VOYAGE_API_KEY)
      EMBEDDINGS_PROVIDER: ${EMBEDDINGS_PROVIDER:-local}
      TRANSFORMERS_CACHE: /data/models
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}

      # Optional integrations
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      APP_URL: ${APP_URL:-http://localhost}

    volumes:
      - api_data:/data
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - opengrafo-network
    healthcheck:
      # The api image has no wget/curl — probe /health with node's built-in fetch
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        # Browser-accessible URLs — NOT internal Docker service names
        VITE_API_URL: /graphql
        VITE_API_BASE_URL: http://localhost:4000
        VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:-http://localhost:8080}
        VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID:-opengrafo-web}
    ports:
      - "5173:80"
    depends_on:
      - api
    networks:
      - opengrafo-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  portal:
    build:
      context: ..
      dockerfile: apps/portal/Dockerfile
      args:
        # Browser-accessible URLs — NOT internal Docker service names
        VITE_API_URL: /graphql
        VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:-http://localhost:8080}
        VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID_PORTAL:-opengrafo-portal}
        # Set to your tenant slug to access portal at localhost:5174 (no subdomain)
        VITE_TENANT_SLUG: ${VITE_TENANT_SLUG:-}
    ports:
      - "5174:80"
    depends_on:
      - api
    networks:
      - opengrafo-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

networks:
  opengrafo-network:
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:
  redis_data:
  minio_data:
  grafana_data:
  keycloak_data:
  api_data:
  jaeger_data:
