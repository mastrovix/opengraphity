services:
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/opengraphity_local
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: opengraphity
      MINIO_ROOT_PASSWORD: opengraphity_local
    volumes:
      - minio_data:/data

  grafana:
    image: grafana/grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - opengrafo-network

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: opengrafo-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: opengrafo_local
      KC_DB: dev-file
      KC_HTTP_PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
    networks:
      - opengrafo-network

  jaeger:
    image: jaegertracing/all-in-one:1.56
    container_name: jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - SPAN_STORAGE_TYPE=memory
      - MEMORY_MAX_TRACES=10000
    ports:
      - "16686:16686"   # Jaeger UI
      - "4318:4318"     # OTLP HTTP receiver
    mem_limit: 512m
    restart: unless-stopped
    networks:
      - opengrafo-network

  loki:
    image: grafana/loki:2.9.0
    container_name: opengrafo-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - opengrafo-network

  promtail:
    image: grafana/promtail:2.9.0
    container_name: opengrafo-promtail
    volumes:
      - /tmp:/var/log/opengrafo
      - ./promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - opengrafo-network
    depends_on:
      - loki

  # Dev workflow:
  #   pnpm --filter "./packages/**" build
  #   pnpm --filter @opengraphity/api build
  #   pnpm --filter @opengraphity/web build
  #   node --env-file=apps/api/.env apps/api/dist/index.js &
  #   docker compose -f infra/docker-compose.yml up -d
  #   Accesso: http://c-one.localhost
  nginx-dev:
    image: nginx:stable-alpine
    container_name: opengrafo-nginx-dev
    ports:
      - "80:8080"
    volumes:
      - ./nginx-dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ../apps/web/dist:/usr/share/nginx/html:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - opengrafo-network
    depends_on:
      - keycloak

networks:
  opengrafo-network:
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:
  redis_data:
  minio_data:
  grafana_data:
  keycloak_data:
