name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # Reads the pnpm version from the packageManager field in package.json
      - uses: pnpm/action-setup@v4

      # Node 20 to match the production images (node:20-slim) — and
      # isolated-vm (native addon) does not compile against Node 22's V8
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Shared packages must be built first: apps resolve
      # @opengraphity/* imports against each package's dist/
      - name: Build packages
        run: pnpm --filter "./packages/*" build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      # API tests are fully mocked (no Neo4j/Redis needed); packages
      # without a test script are skipped via --if-present
      - name: Test
        run: pnpm test

      - name: Build apps
        run: |
          pnpm --filter @opengraphity/api build
          pnpm --filter @opengraphity/web build
