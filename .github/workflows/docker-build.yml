name: Docker Build

# Verifies the container images build before merge — no push.
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # The api image builds the whole workspace inside the container
      - name: Build api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      # The web image only copies a pre-built dist (see apps/web/Dockerfile),
      # so the bundle must be built on the runner first
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Build web dist
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter "./packages/*" build
          pnpm --filter @opengraphity/web build

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max
